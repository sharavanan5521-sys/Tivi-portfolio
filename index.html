<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tiviyan Magendhran — Visual Storyteller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bungee&family=Permanent+Marker&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap">
<style>
/* ===============================================
   TIVIYAN PORTFOLIO — Manga / Ink & Tone System
   =============================================== */

:root {
  --paper: #f5f1e8;
  --paper-2: #ebe5d6;
  --ink: #0a0a0a;
  --ink-2: #2a2a2a;
  --ink-3: #5a5a5a;
  --accent: #d62828;
  --accent-2: #a51d1d;

  --font-display: 'Anton', 'Bebas Neue', sans-serif;
  --font-sfx: 'Bangers', 'Anton', cursive;
  --font-body: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-jp: 'Zen Kaku Gothic New', 'Plus Jakarta Sans', sans-serif;

  --halftone-size: 6px;
  --halftone-dot: 1.2px;
  --halftone-opacity: 0.18;

  --panel-border: 3px solid var(--ink);
  --panel-shadow: 6px 6px 0 var(--ink);
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  overflow-x: hidden;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.025), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02), transparent 60%);
  mix-blend-mode: multiply;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* ====== HALFTONE ====== */
.halftone {
  background-image: radial-gradient(var(--ink) var(--halftone-dot), transparent calc(var(--halftone-dot) + 0.5px));
  background-size: var(--halftone-size) var(--halftone-size);
  opacity: var(--halftone-opacity);
}
.halftone-red {
  background-image: radial-gradient(var(--accent) var(--halftone-dot), transparent calc(var(--halftone-dot) + 0.5px));
  background-size: var(--halftone-size) var(--halftone-size);
}
.halftone-gradient {
  background-image: radial-gradient(var(--ink) var(--halftone-dot), transparent calc(var(--halftone-dot) + 0.5px));
  background-size: var(--halftone-size) var(--halftone-size);
  -webkit-mask-image: linear-gradient(to bottom, black, transparent);
  mask-image: linear-gradient(to bottom, black, transparent);
}

.speed-lines {
  background-image: repeating-linear-gradient(
    90deg,
    var(--ink) 0 2px,
    transparent 2px 14px
  );
  -webkit-mask-image: radial-gradient(ellipse at right, transparent 30%, black 80%);
  mask-image: radial-gradient(ellipse at right, transparent 30%, black 80%);
  opacity: 0.4;
}

/* ====== PANEL ====== */
.panel {
  position: relative;
  background: var(--paper);
  border: var(--panel-border);
  box-shadow: var(--panel-shadow);
  overflow: hidden;
}

/* ====== NAV ====== */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 2px solid var(--ink);
  backdrop-filter: blur(4px);
}
.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo .dot {
  width: 14px; height: 14px;
  background: var(--accent);
  border: 2px solid var(--ink);
  border-radius: 50%;
  display: inline-block;
}
.nav-links {
  display: flex;
  gap: 4px;
  list-style: none;
  padding: 0; margin: 0;
}
.nav-links a {
  position: relative;
  padding: 8px 14px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  transition: transform 0.18s ease;
  display: block;
}
.nav-links a::after {
  content: '';
  position: absolute;
  left: 14px; right: 14px; bottom: 4px;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s ease;
}
.nav-links a:hover { transform: translate(-1px, -1px); }
.nav-links a:hover::after { transform: scaleX(1); }
.nav-links a.active::after { transform: scaleX(1); }

/* ====== SECTION ====== */
.section {
  position: relative;
  max-width: 1280px;
  margin: 0 auto;
  padding: 100px 32px;
  z-index: 2;
}
.section-title {
  position: relative;
  display: inline-block;
  font-family: var(--font-display);
  font-size: clamp(48px, 7vw, 96px);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  line-height: 0.9;
  margin: 0 0 12px;
}
.section-title .halftone-bg {
  position: absolute;
  inset: -20px -30px -10px -30px;
  z-index: -1;
  opacity: 0.35;
  pointer-events: none;
}
.section-eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-eyebrow::before {
  content: '';
  width: 40px; height: 2px;
  background: var(--accent);
}

/* ====== HERO ====== */
.hero {
  position: relative;
  min-height: calc(100vh - 60px);
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 40px;
  padding: 60px 32px 80px;
  max-width: 1320px;
  margin: 0 auto;
  align-items: center;
  z-index: 2;
}
.hero-text { position: relative; z-index: 3; }
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  border: 1.5px solid var(--ink);
  background: var(--paper);
  margin-bottom: 28px;
}
.hero-eyebrow .pulse {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(72px, 11vw, 168px);
  line-height: 0.82;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  margin: 0 0 8px;
}
.hero-title .line-2 {
  color: transparent;
  -webkit-text-stroke: 2px var(--ink);
  display: block;
}

.hero-subtitle {
  font-family: var(--font-body);
  font-size: clamp(15px, 1.4vw, 19px);
  font-weight: 500;
  color: var(--ink-2);
  max-width: 520px;
  margin: 24px 0 36px;
  line-height: 1.55;
}
.hero-subtitle .pipe { color: var(--accent); margin: 0 8px; font-weight: 700; }

.cta-row { display: flex; gap: 16px; flex-wrap: wrap; }
.cta {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 2.5px solid var(--ink);
  background: var(--paper);
  color: var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.cta:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
.cta:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
.cta--primary { background: var(--accent); color: var(--paper); border-color: var(--ink); }
.cta--primary:hover { background: var(--accent-2); }
.cta .arrow { transition: transform 0.2s ease; }
.cta:hover .arrow { transform: translateX(4px); }

.hero-art {
  position: relative;
  aspect-ratio: 4/5;
  max-height: 80vh;
  justify-self: end;
  width: 100%;
  z-index: 2;
}
.hero-art .frame {
  position: absolute;
  inset: 0;
  border: 3px solid var(--ink);
  box-shadow: 12px 12px 0 var(--ink);
  background: var(--paper-2);
  overflow: hidden;
}
.hero-art .corner-tag {
  position: absolute;
  top: -2px; left: -2px;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  padding: 6px 14px;
  z-index: 2;
}

.sfx {
  position: absolute;
  font-family: var(--font-sfx);
  font-weight: 400;
  text-transform: uppercase;
  -webkit-text-stroke: 2px var(--ink);
  pointer-events: none;
  user-select: none;
  z-index: 4;
  white-space: nowrap;
}
.hero-sfx-1 {
  top: 8%; left: 38%;
  font-size: clamp(40px, 5vw, 72px);
  transform: rotate(-8deg);
  color: var(--accent);
  -webkit-text-stroke: 2px var(--ink);
}
.hero-sfx-2 {
  bottom: 12%; left: -2%;
  font-size: clamp(32px, 4vw, 56px);
  transform: rotate(-4deg);
  color: var(--paper);
  -webkit-text-stroke: 2.5px var(--ink);
}
.hero-corner-mark {
  position: absolute;
  top: 24px; right: 32px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 8px;
  writing-mode: vertical-rl;
}
.hero-jp {
  position: absolute;
  bottom: 60px; right: 32px;
  font-family: var(--font-jp);
  font-weight: 900;
  font-size: 14px;
  color: var(--ink-3);
  writing-mode: vertical-rl;
  letter-spacing: 0.1em;
}

.scroll-cue {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--ink-3);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: bob 2s ease-in-out infinite;
}
.scroll-cue::after {
  content: ''; width: 1px; height: 36px; background: var(--ink-3);
  animation: drip 2s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,6px)} }
@keyframes drip { 0%{height:8px} 50%{height:36px} 100%{height:8px} }

/* ====== PORTFOLIO GRID ====== */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: 110px;
  gap: 18px;
  margin-top: 48px;
}
.tile {
  position: relative;
  overflow: hidden;
  border: 3px solid var(--ink);
  background: var(--paper-2);
  box-shadow: 6px 6px 0 var(--ink);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.tile:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0 var(--ink); }
.tile .tile-meta {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 14px 16px 12px;
  background: linear-gradient(to top, rgba(10,10,10,0.92), rgba(10,10,10,0));
  color: var(--paper);
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  transform: translateY(20%);
  opacity: 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  pointer-events: none;
  z-index: 3;
}
.tile:hover .tile-meta { transform: translateY(0); opacity: 1; }
.tile .tile-cat {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
}
.tile .tile-title {
  font-family: var(--font-display);
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1;
  margin: 4px 0 0;
}
.tile .tile-expand {
  position: absolute;
  top: 10px; right: 10px;
  width: 36px; height: 36px;
  background: var(--paper);
  border: 2px solid var(--ink);
  display: grid;
  place-items: center;
  z-index: 4;
  opacity: 0;
  transform: scale(0.85) rotate(-5deg);
  transition: opacity 0.2s ease, transform 0.2s ease;
  cursor: pointer;
  color: var(--ink);
}
.tile:hover .tile-expand { opacity: 1; transform: scale(1) rotate(0); }
.tile .tile-expand:hover { background: var(--accent); color: var(--paper); }
.tile .corner-num {
  position: absolute;
  top: 0; left: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  z-index: 3;
  letter-spacing: 0.1em;
}

.tile.t-hero  { grid-column: span 7; grid-row: span 4; }
.tile.t-tall  { grid-column: span 5; grid-row: span 6; }
.tile.t-wide  { grid-column: span 5; grid-row: span 3; }
.tile.t-med   { grid-column: span 4; grid-row: span 3; }
.tile.t-sm    { grid-column: span 3; grid-row: span 3; }
.tile.t-wide2 { grid-column: span 8; grid-row: span 3; }

.category-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin: 24px 0 8px;
}
.cat-pill {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 8px 14px;
  border: 2px solid var(--ink);
  background: var(--paper);
  transition: all 0.15s ease;
}
.cat-pill[data-active="true"] { background: var(--ink); color: var(--paper); }
.cat-pill:hover { transform: translate(-1px, -1px); }

/* ====== LIGHTBOX ====== */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10,10,10,0.94);
  display: grid;
  place-items: center;
  padding: 40px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.lightbox-inner {
  position: relative;
  max-width: min(1100px, 92vw);
  max-height: 88vh;
  background: var(--paper);
  border: 3px solid var(--paper);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  animation: pop 0.25s cubic-bezier(.2,.9,.3,1.2);
  overflow: hidden;
}
@keyframes pop { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
.lightbox-art {
  background: var(--paper-2);
  display: grid; place-items: center;
  min-height: 60vh;
  position: relative;
  overflow: hidden;
}
.lightbox-meta {
  padding: 36px 36px 30px;
  display: flex; flex-direction: column;
  gap: 18px;
  border-left: 2px solid var(--ink);
  background: var(--paper);
  overflow-y: auto;
}
.lightbox-meta .cat { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); }
.lightbox-meta h3 { font-family: var(--font-display); font-size: 42px; line-height: 1; margin: 0; text-transform: uppercase; }
.lightbox-meta .desc { font-size: 14px; line-height: 1.55; color: var(--ink-2); }
.lightbox-meta .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
.lightbox-meta .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 4px 8px; border: 1.5px solid var(--ink); }
.lightbox-close {
  position: absolute; top: 16px; right: 16px;
  width: 44px; height: 44px;
  background: var(--accent); color: var(--paper);
  border: 3px solid var(--paper);
  font-family: var(--font-display); font-size: 22px;
  display: grid; place-items: center;
  cursor: pointer;
  transition: transform 0.15s ease;
  z-index: 10;
}
.lightbox-close:hover { transform: rotate(90deg); }
.lightbox-nav {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  background: var(--paper); border: 2.5px solid var(--ink);
  width: 48px; height: 48px;
  display: grid; place-items: center;
  font-family: var(--font-display); font-size: 24px;
  cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink);
  z-index: 201;
}
.lightbox-nav:hover { background: var(--accent); color: var(--paper); }
.lightbox-prev { left: 16px; }
.lightbox-next { right: 16px; }

/* ====== ORIGIN ====== */
.origin {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: 60px;
  align-items: start;
  margin-top: 56px;
}
.origin-art {
  position: relative;
  aspect-ratio: 4/5;
  background: var(--paper-2);
  border: 3px solid var(--ink);
  box-shadow: 10px 10px 0 var(--ink);
  overflow: hidden;
}
.origin-art .label {
  position: absolute;
  bottom: 14px; left: 14px;
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 6px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  z-index: 2;
}

.narrative p {
  font-size: 17px;
  line-height: 1.7;
  margin: 0 0 16px;
  max-width: 56ch;
  text-wrap: pretty;
}
.narrative p .accent-text { background: var(--accent); color: var(--paper); padding: 0 6px; font-weight: 700; }
.narrative .pull {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1.1;
  text-transform: uppercase;
  margin: 24px 0;
  border-left: 6px solid var(--accent);
  padding-left: 18px;
}

.arsenal-title {
  font-family: var(--font-display);
  font-size: 24px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 36px 0 14px;
  display: flex; align-items: center; gap: 10px;
}
.arsenal-title::before { content: '◆'; color: var(--accent); }

.tools {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.tool {
  border: 2.5px solid var(--ink);
  padding: 18px 16px;
  background: var(--paper);
  box-shadow: 4px 4px 0 var(--ink);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  display: flex; flex-direction: column; gap: 8px;
}
.tool:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
.tool .ico { width: 32px; height: 32px; }
.tool .nm { font-family: var(--font-display); font-size: 16px; text-transform: uppercase; letter-spacing: 0.02em; }
.tool .sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; color: var(--ink-3); text-transform: uppercase; }

.focus-list {
  list-style: none; padding: 0; margin: 16px 0 0;
  display: flex; flex-wrap: wrap; gap: 8px;
}
.focus-list li {
  padding: 6px 12px;
  border: 2px solid var(--ink);
  font-size: 13px;
  font-weight: 600;
  background: var(--paper);
}
.focus-list li.hl { background: var(--ink); color: var(--paper); }

.teaser {
  margin-top: 24px;
  position: relative;
  border: 2.5px dashed var(--ink);
  padding: 18px 20px;
  background: var(--paper);
  display: flex; align-items: center; gap: 16px;
}
.teaser .badge {
  background: var(--accent); color: var(--paper);
  font-family: var(--font-display); font-size: 13px;
  padding: 4px 10px;
  letter-spacing: 0.1em;
  transform: rotate(-2deg);
  flex-shrink: 0;
}
.teaser .body { font-size: 14px; line-height: 1.5; }
.teaser .body strong { font-family: var(--font-display); font-size: 18px; text-transform: uppercase; display: block; margin-bottom: 2px; letter-spacing: 0.02em; }

/* ====== TIMELINE ====== */
.timeline {
  position: relative;
  margin-top: 64px;
  padding: 20px 0;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 3px;
  background: var(--ink);
  transform: translateX(-50%);
}
.tl-node {
  position: relative;
  width: 50%;
  padding: 16px 56px;
  margin-bottom: 40px;
}
.tl-node.left { left: 0; text-align: right; }
.tl-node.right { left: 50%; text-align: left; }
.tl-node .dot {
  position: absolute;
  top: 28px;
  width: 22px; height: 22px;
  background: var(--accent);
  border: 3px solid var(--ink);
  border-radius: 50%;
  z-index: 2;
}
.tl-node.left  .dot { right: -11px; }
.tl-node.right .dot { left: -11px; }
.tl-node .card {
  display: inline-block;
  text-align: left;
  background: var(--paper);
  border: 3px solid var(--ink);
  box-shadow: 6px 6px 0 var(--ink);
  padding: 20px 22px;
  max-width: 460px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.tl-node:hover .card { transform: translate(-2px, -2px); box-shadow: 9px 9px 0 var(--ink); }
.tl-node .year {

.tl-node .org .tag {

/* ====== CONTACT ====== */
.contact {
  position: relative;
  margin-top: 56px;
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 50px;
  align-items: center;
}
.contact-art {
  position: relative;
  aspect-ratio: 4/5;
  background: var(--paper-2);
  border: 3px solid var(--ink);
  box-shadow: 10px 10px 0 var(--ink);
  overflow: visible;
}
.contact-art .inner {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.contact-art .bubble {
  position: absolute;
  top: -24px; right: -40px;
  background: var(--paper);
  border: 3px solid var(--ink);
  box-shadow: 5px 5px 0 var(--ink);
  padding: 14px 20px;
  font-family: var(--font-sfx);
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--ink);
  transform: rotate(4deg);
  z-index: 3;
}
.contact-art .bubble::after {
  content: '';
  position: absolute;
  left: 24px; bottom: -16px;
  width: 18px; height: 18px;
  background: var(--paper);
  border-right: 3px solid var(--ink);
  border-bottom: 3px solid var(--ink);
  transform: rotate(45deg);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 18px;
}
.contact-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: var(--paper);
  border: 2.5px solid var(--ink);
  box-shadow: 5px 5px 0 var(--ink);

}
.contact-card:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
.contact-card .ico {
  width: 38px; height: 38px;
  background: var(--ink);
  display: grid; place-items: center;
  color: var(--paper);
  flex-shrink: 0;
}
.contact-card .lab {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.contact-card .val { font-weight: 700; font-size: 15px; }

.socials { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.social-pill {
  display: inline-flex;
  align-items: center; gap: 8px;
  padding: 10px 14px;
  border: 2.5px solid var(--ink);
  background: var(--paper);

  font-size: 13px;

.social-pill:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); background: var(--accent); color: var(--paper); }

/* ====== FOOTER ====== */
.footer {
  background: var(--ink);
  color: var(--paper);
  padding: 32px;
  position: relative;
  z-index: 3;
}
.footer-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ====== SCROLL SFX ====== */
.scroll-sfx-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}
.scroll-sfx {
  position: absolute;
  font-family: var(--font-sfx);
  font-weight: 400;
  text-transform: uppercase;
  white-space: nowrap;
  user-select: none;
  animation: sfx-burst 1.4s cubic-bezier(.2,.7,.3,1) forwards;
  -webkit-text-stroke: 2px var(--ink);
}
@keyframes sfx-burst {
  0%   { transform: scale(0.6) rotate(var(--r, -8deg)); opacity: 0; }
  18%  { transform: scale(1.15) rotate(var(--r, -8deg)); opacity: 1; }
  60%  { transform: scale(1) rotate(var(--r, -8deg)); opacity: 1; }
  100% { transform: scale(1) rotate(var(--r, -8deg)) translateY(-30px); opacity: 0; }
}

/* ====== IMAGE SLOT PLACEHOLDER ====== */
.img-slot {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--paper-2);
  position: relative;
  overflow: hidden;
  gap: 10px;
  min-height: 80px;
}
.img-slot-halftone {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(var(--ink) var(--halftone-dot), transparent calc(var(--halftone-dot) + 0.5px));
  background-size: var(--halftone-size) var(--halftone-size);
  opacity: 0.12;
  pointer-events: none;
}
.img-slot-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-3);
  opacity: 0.45;
  text-align: center;
  padding: 0 16px;
  position: relative;
  z-index: 1;
}

/* ====== RESPONSIVE ====== */
@media (max-width: 960px) {

  .contact { grid-template-columns: 1fr; }

  .tl-node { width: 100%; padding-left: 48px; padding-right: 0; text-align: left !important; }
  .tl-node.left, .tl-node.right { left: 0; }
  .tl-node.left .dot, .tl-node.right .dot { left: 7px; right: auto; }
  .tile.t-hero, .tile.t-tall, .tile.t-wide, .tile.t-med, .tile.t-sm, .tile.t-wide2 {

  .lightbox-inner { grid-template-columns: 1fr; }
  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }
  .contact-grid { grid-template-columns: 1fr; }
  .tools { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .section { padding: 60px 20px; }
  .nav-inner { padding: 14px 20px; }
  .hero { padding: 40px 20px 60px; }
  .tools { grid-template-columns: 1fr; }
}
</style>
</head>

/* ─── ICONS ─── */
const Icons = {

/* ─── ACTIVE SECTION HOOK ─── */
function useActiveSection(ids) {
  const [active, setActive] = React.useState(ids[0]);
  React.useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
      if (visible[0]) setActive(visible[0].target.id);
    }, { rootMargin: "-30% 0px -50% 0px", threshold: [0, 0.25, 0.5] });
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);
  return active;
}

/* ─── SCROLL SFX ─── */
function ScrollSFX() {
  const [bursts, setBursts] = React.useState([]);
  const lastY = React.useRef(0);
  const cooldown = React.useRef(0);

  React.useEffect(() => {
    const words = ["POW!", "BAM!", "WHAM!", "BOOM!", "ZOOM!", "WHOOSH", "CRACK!", "BANG!", "SLAM!", "ZAP!"];
    const onScroll = () => {
      const now = Date.now();
      if (now < cooldown.current) return;
      const dy = Math.abs(window.scrollY - lastY.current);
      if (dy < 280) return;
      lastY.current = window.scrollY;
      cooldown.current = now + 700;
      const id = Math.random().toString(36).slice(2);
      const word = words[Math.floor(Math.random() * words.length)];
      const top = 20 + Math.random() * 60;
      const left = 10 + Math.random() * 70;
      const rot = -14 + Math.random() * 28;
      const size = 40 + Math.random() * 50;
      const red = Math.random() < 0.45;
      setBursts(b => [...b, { id, word, top, left, rot, size, red }]);
      setTimeout(() => setBursts(b => b.filter(x => x.id !== id)), 1400);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div className="scroll-sfx-layer" aria-hidden="true">
      {bursts.map(b => (
        <span key={b.id} className="scroll-sfx"
              style={{
                top: `${b.top}%`,
                left: `${b.left}%`,
                fontSize: `${b.size}px`,
                color: b.red ? "var(--accent)" : "var(--paper)",
                "--r": `${b.rot}deg`,
                WebkitTextStroke: "2.5px var(--ink)",
              }}>
          {b.word}
        </span>
      ))}
    </div>
  );
}

/* ─── NAV ─── */
function Nav({ activeSection }) {

    { id: "home",       label: "Home" },
    { id: "portfolio",  label: "Portfolio" },
    { id: "origin",     label: "Origin" },

    e.preventDefault();

  };
  return (
    <nav className="nav">
      <div className="nav-inner">
        <a href="#home" onClick={(e) => scrollTo(e, "home")} className="nav-logo">
          <span className="dot" />

          {links.map(l => (
            <li key={l.id}>
              <a
                href={`#${l.id}`}
                className={activeSection === l.id ? "active" : ""}

}

/* ─── SECTION WRAPPER ─── */
function Section({ id, eyebrow, title, children, style = {} }) {

}

/* ─── HERO ─── */
function Hero() {

/* ─── PORTFOLIO ─── */
const WORKS = [

    tags: ["Comic", "Layout", "Pacing"],

    desc: "Japanese manga rendering studies — focus on screentones, hatch density and expressive line weight.",
    tags: ["Manga", "Study", "Tone"],

    tags: ["Character", "Face", "Silhouette"],

    tags: ["Print", "Typography", "CMYK"],
  },
  {
    id: "w06", num: "06", cat: "Sequential", title: "Fight Scene Study", span: "t-wide2",
    desc: "Action choreography across a six-panel sequence — speed lines, impact frames, motion blur.",
    tags: ["Comic", "Action", "Motion"],
  },
];

const CATEGORIES = ["All", "Character", "Sequential", "Manga Study", "Print"];

function Portfolio() {
  const [activeCat, setActiveCat] = React.useState("All");
  const [lightboxIdx, setLightboxIdx] = React.useState(null);

  const filtered = activeCat === "All" ? WORKS : WORKS.filter(w => w.cat === activeCat);
  const open  = (idx) => setLightboxIdx(idx);
  const close = ()    => setLightboxIdx(null);
  const next  = ()    => setLightboxIdx(i => (i + 1) % filtered.length);
  const prev  = ()    => setLightboxIdx(i => (i - 1 + filtered.length) % filtered.length);

  React.useEffect(() => {
    if (lightboxIdx === null) return;
    const onKey = (e) => {
      if (e.key === "Escape")     close();
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft")  prev();
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [lightboxIdx, filtered.length]);

  const active = lightboxIdx !== null ? filtered[lightboxIdx] : null;

  return (
    <Section id="portfolio" eyebrow="02 — Selected Works" title="The Vault">
      <p style={{ maxWidth: 560, marginTop: 8, fontSize: 17, lineHeight: 1.55, color: "var(--ink-2)" }}>
        A working sample of original character design, sequential art and manga studies.
        Tap any panel to open the splash view.
      </p>

      <div className="category-row">
        {CATEGORIES.map(c => (
          <button
            key={c}
            className="cat-pill"
            data-active={c === activeCat}
            onClick={() => setActiveCat(c)}
          >
            {c}
          </button>
        ))}
      </div>

      <div className="portfolio-grid">
        {filtered.map((w, i) => (
          <article key={w.id} className={`tile ${w.span}`}>
            <div style={{ position: "absolute", inset: 0 }}>
              <ImageSlot placeholder={`Drop ${w.title} art`} />
            </div>
            <span className="corner-num">№ {w.num}</span>
            <button className="tile-expand" onClick={() => open(i)} aria-label={`Open ${w.title}`}>
              {Icons.expand}
            </button>
            <div className="tile-meta">
              <div>
                <div className="tile-cat">{w.cat}</div>
                <h3 className="tile-title">{w.title}</h3>
              </div>
            </div>
          </article>
        ))}
      </div>

      {active && (
        <div className="lightbox" onClick={close} role="dialog" aria-modal="true">
          <button className="lightbox-nav lightbox-prev" onClick={(e) => { e.stopPropagation(); prev(); }} aria-label="Previous">‹</button>
          <button className="lightbox-nav lightbox-next" onClick={(e) => { e.stopPropagation(); next(); }} aria-label="Next">›</button>
          <div className="lightbox-inner" onClick={e => e.stopPropagation()}>
            <button className="lightbox-close" onClick={close} aria-label="Close">×</button>
            <div className="lightbox-art">
